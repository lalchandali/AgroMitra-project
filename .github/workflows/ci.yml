name: AgroMitra CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  frontend:
    name: React Frontend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: AgroMitra/frontend

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: AgroMitra/frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Build React App
        run: npm run build

  backend:
    name: FastAPI Backend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: AgroMitra/backend

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip

          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

          pip install ruff pytest

      - name: Run Ruff
        run: ruff check .

      - name: Run Tests
        run: |
          if [ -d tests ]; then
            pytest
          else
            echo "No tests found. Skipping."
          fi
