  <circle cx="52" cy="64" r="5.5" fill="#F9A825"/>
  <circle cx="30" cy="48" r="3" fill="#F9A825" opacity="0.85"/>
  <circle cx="74" cy="48" r="3" fill="#F9A825" opacity="0.85"/>
  <path d="M 33 49 L 47 62" stroke="#F9A825" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <path d="M 71 49 L 57 62" stroke="#F9A825" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
