<svg width="104" height="104" viewBox="0 0 104 104" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>AgroMitra icon</title>
  <desc>A circular mark with two curved leaf blades meeting at a golden connecting node, symbolizing farmer and buyer joined directly.</desc>

  <defs>
