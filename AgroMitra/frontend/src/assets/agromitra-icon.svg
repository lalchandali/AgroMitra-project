      <stop offset="0%" stop-color="#143D31"/>
      <stop offset="100%" stop-color="#1B5E20"/>
    </linearGradient>
    <linearGradient id="iconLeafRight" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2E7D32"/>
      <stop offset="100%" stop-color="#4CAF50"/>
    </linearGradient>
  </defs>

  <circle cx="52" cy="52" r="52" fill="#0E2E24"/>

  <path d="M 52 88
           C 30 88 16 70 16 48
           C 16 30 28 16 44 14
           C 40 30 42 50 52 64
           C 44 56 32 50 22 50
           C 26 70 38 84 52 88 Z"
        fill="url(#iconLeafLeft)"/>

